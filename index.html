<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GradeForge</title>
  <meta name="description" content="GradeForge is a modern Anna University CGPA calculator with a dynamic subject builder." />
  <link rel="icon" type="image/png" href="anvil.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Space Grotesk", "ui-sans-serif", "sans-serif"]
          },
          colors: {
            neon: {
              cyan: "#2ee6ff",
              violet: "#8e6bff",
              blue: "#2f7dff"
            }
          },
          boxShadow: {
            glow: "0 0 0 1px rgba(46, 230, 255, 0.35), 0 0 30px rgba(46, 230, 255, 0.25)",
            glowSoft: "0 0 18px rgba(46, 230, 255, 0.28)"
          },
          keyframes: {
            float: {
              "0%, 100%": { transform: "translateY(0px)" },
              "50%": { transform: "translateY(-10px)" }
            },
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(12px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            },
            pulseGlow: {
              "0%, 100%": { boxShadow: "0 0 0 1px rgba(46, 230, 255, 0.35), 0 0 20px rgba(46, 230, 255, 0.2)" },
              "50%": { boxShadow: "0 0 0 1px rgba(46, 230, 255, 0.45), 0 0 28px rgba(46, 230, 255, 0.35)" }
            }
          },
          animation: {
            float: "float 7s ease-in-out infinite",
            fadeUp: "fadeUp 0.6s ease forwards",
            pulseGlow: "pulseGlow 2.5s ease-in-out infinite"
          }
        }
      }
    };
  </script>
  <style>
    :root {
      --bg-a: #070b1a;
      --bg-b: #0e1630;
      --bg-c: #111a3a;
      --text-soft: rgba(224, 231, 255, 0.72);
      --glass-line: rgba(255, 255, 255, 0.14);
      --glass-fill: rgba(255, 255, 255, 0.08);
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(1200px 600px at 8% 10%, rgba(46, 230, 255, 0.14), transparent 60%),
        radial-gradient(900px 500px at 95% 5%, rgba(142, 107, 255, 0.16), transparent 60%),
        linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 52%, var(--bg-c) 100%);
      color: #edf2ff;
      overflow-x: hidden;
    }

    .glass {
      border: 1px solid var(--glass-line);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.11), var(--glass-fill));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .neon-border {
      border-color: rgba(46, 230, 255, 0.4);
      box-shadow: 0 0 0 1px rgba(46, 230, 255, 0.2), 0 0 26px rgba(46, 230, 255, 0.2);
    }

    .text-soft {
      color: var(--text-soft);
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 85%);
      -webkit-mask-image: radial-gradient(circle at center, black 0%, transparent 85%);
    }

    .subject-row {
      animation: fadeUp 0.38s ease forwards;
    }
  </style>
</head>
<body class="font-sans antialiased selection:bg-neon-cyan/30">
  <div class="grid-bg"></div>

  <main class="relative mx-auto max-w-5xl px-4 pb-14 pt-8 sm:px-6 lg:px-8">
    <section class="glass neon-border animate-float rounded-3xl p-6 shadow-glow sm:p-8">
      <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <p class="text-sm uppercase tracking-[0.24em] text-neon-cyan/80">GradeForge</p>
          <h1 class="mt-2 text-3xl font-bold leading-tight text-white sm:text-5xl">Forge Your CGPA</h1>
          <p class="mt-3 max-w-xl text-soft">
            Anna University Regulation 2025 (Semester I) CGPA calculator with official grade-point mapping and credit-based computation.
          </p>
        </div>

        <button
          id="addSubjectBtn"
          class="group inline-flex items-center justify-center rounded-xl border border-neon-cyan/50 bg-neon-cyan/10 px-5 py-3 text-sm font-semibold text-neon-cyan transition duration-300 hover:-translate-y-0.5 hover:bg-neon-cyan/20 hover:shadow-glowSoft active:translate-y-0"
          type="button"
        >
          <span class="mr-2 text-base">+</span>
          Add Subject
        </button>
      </div>

      <div class="overflow-hidden rounded-2xl border border-white/15 bg-slate-900/40">
        <div class="grid grid-cols-12 border-b border-white/10 px-4 py-3 text-xs uppercase tracking-[0.16em] text-soft sm:px-5">
          <div class="col-span-5 sm:col-span-6">Subject</div>
          <div class="col-span-4 sm:col-span-3">Grade</div>
          <div class="col-span-3">Credits</div>
        </div>

        <div id="subjectsContainer" class="divide-y divide-white/10"></div>
      </div>

      <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <p class="text-sm text-soft">Grades: S, A+, A, B+, B, U</p>
        <button
          id="calculateBtn"
          class="animate-pulseGlow rounded-xl bg-gradient-to-r from-neon-blue to-neon-violet px-6 py-3 text-sm font-semibold text-white transition duration-300 hover:brightness-110"
          type="button"
        >
          Calculate CGPA
        </button>
      </div>
    </section>

    <section id="resultCard" class="glass mt-8 hidden rounded-3xl border border-white/20 p-6 shadow-glow sm:p-8">
      <p class="text-sm uppercase tracking-[0.2em] text-neon-cyan/75">Your CGPA</p>
      <div class="mt-3 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <p id="cgpaValue" class="text-5xl font-bold text-white sm:text-7xl">0.00</p>
          <p id="performanceText" class="mt-2 text-sm text-soft">Let us calculate your performance.</p>
        </div>
        <div class="text-sm text-soft">Out of 10</div>
      </div>

      <div class="mt-6 h-3 overflow-hidden rounded-full bg-white/10">
        <div id="cgpaProgress" class="h-full w-0 rounded-full bg-gradient-to-r from-neon-cyan via-neon-blue to-neon-violet transition-all duration-1000"></div>
      </div>

      <div class="mt-4 flex flex-wrap gap-3 text-xs text-soft">
        <span id="subjectsCount" class="rounded-full border border-white/20 px-3 py-1">Subjects: 0</span>
        <span id="creditsCount" class="rounded-full border border-white/20 px-3 py-1">Total Credits: 0</span>
      </div>
    </section>
  </main>

  <template id="subjectRowTemplate">
    <div class="subject-row grid grid-cols-12 items-center gap-3 px-4 py-3 sm:px-5">
      <div class="col-span-5 sm:col-span-6">
        <input
          class="subject-name w-full rounded-lg border border-white/20 bg-black/25 px-3 py-2 text-sm text-white outline-none transition focus:border-neon-cyan/80 focus:ring-2 focus:ring-neon-cyan/25"
          type="text"
          placeholder="Subject name"
          maxlength="60"
        />
      </div>

      <div class="col-span-4 sm:col-span-3">
        <select class="subject-grade w-full rounded-lg border border-white/20 bg-black/25 px-3 py-2 text-sm text-white outline-none transition focus:border-neon-cyan/80 focus:ring-2 focus:ring-neon-cyan/25">
          <option value="S">S</option>
          <option value="A+">A+</option>
          <option value="A">A</option>
          <option value="B+">B+</option>
          <option value="B">B</option>
          <option value="U">U</option>
        </select>
      </div>

      <div class="col-span-3 flex items-center gap-2">
        <input
          class="subject-credits w-full rounded-lg border border-white/20 bg-black/25 px-3 py-2 text-sm text-white outline-none transition focus:border-neon-cyan/80 focus:ring-2 focus:ring-neon-cyan/25"
          type="number"
          min="0"
          step="1"
          placeholder="0"
        />
        <button class="remove-row hidden rounded-md border border-rose-300/40 bg-rose-400/10 px-2 py-2 text-xs font-semibold text-rose-200 transition hover:bg-rose-400/20 sm:inline" type="button">Remove</button>
      </div>

      <div class="col-span-12 text-right sm:hidden">
        <button class="remove-row inline rounded-md border border-rose-300/40 bg-rose-400/10 px-2 py-1 text-xs font-semibold text-rose-200 transition hover:bg-rose-400/20" type="button">Remove</button>
      </div>
    </div>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
